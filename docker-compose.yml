services:
  postgres:
    image: postgres:16-alpine
    container_name: merlink-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: merlink
    volumes:
      - merlink_pgdata:/var/lib/postgresql/data

volumes:
  merlink_pgdata:
